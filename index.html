<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hush in the Hollow</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="YOUR_ADOBE_PROJECT_URL_HERE">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 40px 80px;
      background-color: #f6f1e6;
      color: #2f5e46;
    }

    .container {
      max-width: 750px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-family: "ccspellcaster", serif;
      font-size: 52px;
      font-weight: 400;
      margin-bottom: 2px;
      color: #2a5a42;
      white-space: nowrap;
    }

    .title-image {
      height: 260px;
      width: auto;
      object-fit: contain;
    }

    .subtitle {
      font-size: 18px;
      font-weight: 400;
      margin-top: 0;
      margin-bottom: 20px;
      color: #3f7a5a;
    }

    h2 {
      font-size: 26px;
      font-weight: 500;
      margin-top: 40px;
      margin-bottom: 12px;
      color: #2f5e46;
      border-left: 4px solid #6fa58a;
      padding-left: 12px;
    }

    h3 {
      font-size: 18px;
      font-weight: 500;
      margin-top: 18px;
      margin-bottom: 5px;
      color: #3f7a5a;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      color: #3a5f4b;
      margin-bottom: 12px;
    }

    .section-box {
      border: 2px solid #2f5e46;
      border-radius: 12px;
      padding: 18px 22px;
      margin: 20px 0;
      background-color: rgba(255, 255, 255, 0.5);
    }

    .image-row {
      display: flex;
      gap: 12px;
      margin: 10px 0;
    }

    .media-box {
      flex: 1;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .media-box img,
    .media-box video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .rotate-90 {
      transform: rotate(90deg);
    }

    @media (max-width: 700px) {
      .image-row {
        flex-direction: column;
      }

      .title-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .title-image {
        height: 140px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title-row">
      <h1>Hush in the Hollow</h1>
      <img src="Raccoon Design.PNG" class="title-image">
    </div>

    <p class="subtitle">By: Rachel Diamond</p>

    <div class="image-row">

      <div class="media-box">
        <img src="Final Design.JPG" alt="Final Design 1">
      </div>

      <div class="media-box">
        <img src="Final Design 2.JPG" alt="Final Design 2" class="rotate-90">
      </div>

      <div class="media-box">
        <video controls>
          <source src="Final Design Video.MOV" type="video/quicktime">
        </video>
      </div>

    </div>

    <div class="section-box">
      <h2>About the Game</h2>
      <p>Lorem ipsum dolor sit amet...</p>
    </div>

    <div class="section-box">
      <h2>How to Play</h2>
      <p>Lorem ipsum dolor sit amet...</p>
    </div>

  </div>

</body>
</html>
